services:

  postgres:
    image: postgres:18
    container_name: postgres_bd
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: serviciosfinancieros_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data/PG_VERSION


  mongo:
    image: mongo:8
    container_name: mongo_bd
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio
    container_name: minio_ObjectStorage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mocksoap:
    build: ./Servicios/mocksoap
    container_name: mock_soap
    ports:
      - "8090:8090"

  gateway:
    build: ./Servicios/gateway
    container_name: gateway_soap
    ports:
      - "8001:8001"

  fastapi:
    build: ./Servicios/fastapi
    container_name: proccess_document
    ports:
      - "8000:8000"

  notificaciones:
    build: ./Notificaciones
    container_name: notificaciones
    ports:
      - "4000:4000"
    depends_on:
      - fastapi
      - gateway
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - GATEWAY_URL=http://gateway:8001

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:5173"
    command: npm run dev -- --host
    depends_on:
      - notificaciones
    environment:
      - VITE_API_URL=http://localhost:4000

volumes:
  postgres_data:
  mongo_data:
  minio_data: